server {
  listen 80;
  server_name _;

  # Required for SharedArrayBuffer / WebWorkers patterns used by the web UI
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Embedder-Policy "require-corp" always;

  # Backend accepts ZIP uploads up to 200MB best-effort (multer memory storage).
  client_max_body_size 300m;

  # Long-running endpoints (graph creation / embedding generation)
  proxy_connect_timeout 60s;
  proxy_send_timeout 600s;
  proxy_read_timeout 600s;

  location /api/ {
    proxy_pass http://backend:4747;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback for React app
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}

